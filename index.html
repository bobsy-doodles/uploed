<!DOCTYPE html>
<html lang="en">
<head>
    <title>Receipt Data Extractor</title>
</head>
<body>
    <h2>Upload Your Shopping Receipt</h2>
    <input type="file" id="receiptInput" accept="image/*">
    <button onclick="uploadReceipt()">Extract Total</button>
    
    <h3>Result:</h3>
    <p id="totalOutput">Waiting for upload...</p>

    <script>
        async function uploadReceipt() {
            const input = document.getElementById('receiptInput');
            if (input.files.length === 0) return alert('Please select an image first.');

            const formData = new FormData();
            formData.append('receipt', input.files[0]);

            document.getElementById('totalOutput').innerText = "Processing image...";

            // Send image to your backend server
            const response = await fetch('http://localhost:3000/upload', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            document.getElementById('totalOutput').innerText = `Total Money: $${data.total}`;
        }
    </script>
</body>
</html>
